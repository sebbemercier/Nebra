version: '3.8'

services:
  db:
    image: postgres:18-alpine
    container_name: nebra-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-nebra}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: nebra-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/nebra
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here}
      APP_NAME: Nebra
      AUTO_CREATE_TABLES: "true"
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./NebraFront
      dockerfile: Dockerfile
    container_name: nebra-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

  agent:
    build:
      context: ./Agent
      dockerfile: Dockerfile
    container_name: nebra-agent
    restart: always
    environment:
      NEBRA_BACKEND_URL: http://backend:8000
      NEBRA_HEARTBEAT_INTERVAL: 30
    depends_on:
      - backend

volumes:
  postgres_data:
